<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Army - Pure Sound</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black; cursor: pointer;
        }
        .container { display: grid; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; border: none; }
    </style>
</head>
<body>

    <div class="container" id="videoGrid"></div>

    <script>
        const container = document.getElementById('videoGrid');
        const videoSrc = 'cat.mp4';
        
        let count = 1;
        let videoSpeed = 1.0;
        let audioCtx = null;
        let isStarted = false;

        function updateGrid() {
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${count}, 1fr)`;

            const total = count * count;
            for (let i = 0; i < total; i++) {
                const video = document.createElement('video');
                video.src = videoSrc;
                video.autoplay = true;
                video.loop = true;
                video.playsInline = true;
                
                // 1. 영상은 클릭할 때마다 빨라짐
                video.playbackRate = videoSpeed;

                // 2. 소리 설정
                if (isStarted) {
                    video.muted = false;
                    
                    // Web Audio API로 소리 배속 방지 및 증폭
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    
                    const source = audioCtx.createMediaElementSource(video);
                    const gainNode = audioCtx.createGain();
                    
                    // 영상의 속도 변화와 상관없이 오디오 출력 속도를 보정 (브라우저 지원 시)
                    video.preservesPitch = true; 
                    
                    // 볼륨 증폭 (기본 3배, 필요시 조절)
                    gainNode.gain.value = 3.0; 
                    
                    source.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                } else {
                    video.muted = true;
                }

                container.appendChild(video);
            }
        }

        window.addEventListener('click', () => {
            if (!isStarted) isStarted = true;
            
            count++;
            videoSpeed += 0.5; // 영상 속도만 증가
            updateGrid();
        });

        updateGrid();
    </script>
</body>
</html>
