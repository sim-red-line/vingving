<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소리나는 고양이 군단</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black; cursor: pointer;
        }
        .container { display: grid; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #info {
            position: absolute; top: 20px; left: 20px; color: #ff00ff;
            background: rgba(0, 0, 0, 0.8); padding: 15px;
            font-family: 'Courier New', monospace; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="info">화면을 클릭하면 소리와 함께 증식합니다!</div>
    <div class="container" id="videoGrid"></div>

    <script>
        const container = document.getElementById('videoGrid');
        const info = document.getElementById('info');
        const videoSrc = 'cat.mp4';
        
        let count = 1;
        let speed = 1.0;
        let isMuted = true; // 초기 상태는 음소거

        function updateGrid() {
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${count}, 1fr)`;

            for (let i = 0; i < count * count; i++) {
                const video = document.createElement('video');
                video.src = videoSrc;
                video.autoplay = true;
                video.loop = true;
                video.playsInline = true;
                
                // 첫 클릭 이후부터는 음소거를 해제합니다.
                video.muted = isMuted; 
                video.playbackRate = speed;
                
                container.appendChild(video);
            }

            info.innerHTML = `격자: ${count}x${count}<br>속도: ${speed.toFixed(1)}x<br>소리: ${isMuted ? 'OFF' : 'ON'}`;
        }

        window.addEventListener('click', () => {
            // 첫 클릭 시 음소거 해제 승인
            if (isMuted) isMuted = false;
            
            count++;
            count++;
            count++;
            speed += 0.2;
            updateGrid();
        });

        updateGrid();
    </script>
</body>
</html>
