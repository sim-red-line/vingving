<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Army</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            cursor: pointer;
        }

        .container {
            display: grid;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 경계선마저 없애려면 아래 줄을 주석 처리하거나 0으로 바꾸세요 */
            outline: none; 
        }
    </style>
</head>
<body>

    <div class="container" id="videoGrid"></div>

    <script>
        const container = document.getElementById('videoGrid');
        const videoSrc = 'cat.mp4';
        
        let count = 1;
        let videoSpeed = 1.0;
        let isStarted = false;

        function updateGrid() {
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${count}, 1fr)`;

            const total = count * count;
            for (let i = 0; i < total; i++) {
                const video = document.createElement('video');
                video.src = videoSrc;
                video.autoplay = true;
                video.loop = true;
                video.playsInline = true;
                
                // 영상 배속 설정
                video.playbackRate = videoSpeed;
                
                // 소리 톤(피치) 유지 설정
                if ('preservesPitch' in video) video.preservesPitch = true;
                else if ('webkitPreservesPitch' in video) video.webkitPreservesPitch = true;

                // 첫 클릭 전까지는 음소거(브라우저 정책)
                video.muted = !isStarted;

                container.appendChild(video);
            }
        }

        window.addEventListener('click', () => {
            if (!isStarted) isStarted = true;
            
            count++;
            count++;
            videoSpeed += 0.3;
            updateGrid();
        });

        // 초기 화면 (1x1)
        updateGrid();
    </script>
</body>
</html>
