<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>64분할 고양이</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 스크롤 방지 */
            background-color: black;
        }

        .container {
            display: grid;
            /* 8열 8행으로 정확히 나눕니다 */
            grid-template-columns: repeat(8, 12.5vw);
            grid-template-rows: repeat(8, 12.5vh);
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 영상을 칸에 꽉 채움 */
            border: 0.5px solid #222; /* 칸 구분선 (선택사항) */
        }
    </style>
</head>
<body>

    <div class="container" id="videoGrid">
        </div>

    <script>
        const container = document.getElementById('videoGrid');
        const videoSrc = 'cat.mp4'; // 영상 파일 이름

        for (let i = 0; i < 64; i++) {
            const video = document.createElement('video');
            video.src = videoSrc;
            video.autoplay = true;
            video.loop = true;
            video.muted = true; // 브라우저 정책상 자동재생을 위해 음소거 필수
            video.playsInline = true;
            container.appendChild(video);
        }
    </script>
</body>
</html>
