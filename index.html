<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>폭주하는 고양이 격자</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            cursor: pointer;
        }

        .container {
            display: grid;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 0.1px solid rgba(255, 255, 255, 0.05);
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00; /* 터미널 느낌의 초록색 */
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            z-index: 10;
            border-radius: 5px;
            pointer-events: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="info">
        격자 크기: 1 x 1<br>
        재생 속도: 1.0x
    </div>
    <div class="container" id="videoGrid"></div>

    <script>
        const container = document.getElementById('videoGrid');
        const info = document.getElementById('info');
        const videoSrc = 'cat.mp4';
        
        let count = 1;      // 격자 수 (n x n)
        let speed = 1.0;    // 초기 속도

        function updateGrid() {
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${count}, 1fr)`;

            const totalVideos = count * count;
            
            for (let i = 0; i < totalVideos; i++) {
                const video = document.createElement('video');
                video.src = videoSrc;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                
                // 핵심: 비디오 재생 속도 설정
                video.playbackRate = speed;
                
                container.appendChild(video);
            }

            // 정보창 업데이트
            info.innerHTML = `격자 크기: ${count} x ${count}<br>재생 속도: ${speed.toFixed(1)}x`;
        }

        window.addEventListener('click', () => {
            count++;        // 격자 1단계 증가
            speed += 0.5;   // 속도 0.2배 증가
            updateGrid();
        });

        // 시작
        updateGrid();
    </script>
</body>
</html>
